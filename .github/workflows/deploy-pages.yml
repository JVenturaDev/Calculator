name: Deploy Calculator (Angular)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front-end

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Angular project
        run: npx ng build --configuration production --base-href "/Calculator/"

      - name: Add SPA fallback
        run: cp dist/angular-calculator/index.html dist/angular-calculator/404.html

      - name: Verify Pages artifact
        run: |
          test -f dist/angular-calculator/index.html
          test -f dist/angular-calculator/404.html
          test -f dist/angular-calculator/favicon.ico
          grep -q '<base href="/Calculator/">' dist/angular-calculator/index.html

      - name: Configure SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.SSH_LLAVE_PRIVADA }}

      - name: Set up Git identity
        run: |
          git config --global user.name "JVenturaDev"
          git config --global user.email "221253597+JVenturaDev@users.noreply.github.com"

      - name: Deploy to GitHub Pages
        run: npx gh-pages -d dist/angular-calculator -r git@github.com:JVenturaDev/Calculator.git
