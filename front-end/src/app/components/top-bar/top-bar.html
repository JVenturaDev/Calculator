<header class="topbar">
  <div class="topbar-start">
    <button
      class="menuHamburger icon-button"
      type="button"
      aria-label="Abrir o cerrar el menú principal"
      aria-controls="calculator-sidebar"
      [attr.aria-expanded]="(sidebarVisible$ | async) ?? false"
      (click)="toggleSidebar()"
    >
      <svg aria-hidden="true" viewBox="0 0 24 24">
        <path d="M4 7h16M4 12h16M4 17h16" />
      </svg>
    </button>

    <div class="brand" aria-label="Calculator Workspace">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <rect x="4" y="3" width="16" height="18" rx="3" />
          <path d="M8 7h8M8 12h.01M12 12h.01M16 12h.01M8 16h.01M12 16h.01M16 16h.01" />
        </svg>
      </span>
      <span class="brand-copy">
        <strong>Calculator</strong>
        <small>Workspace</small>
      </span>
    </div>
  </div>

  <div class="topbar-spacer" aria-hidden="true"></div>

  <div class="auth-actions">
    <ng-container *ngIf="isAuthenticated(); else signedOut">
      <button
        class="auth-action logout-action"
        type="button"
        aria-label="Cerrar sesión"
        (click)="logout()"
      >
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="M10 5H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h4M14 8l4 4-4 4M18 12H9" />
        </svg>
        <span>Cerrar sesión</span>
      </button>
    </ng-container>

    <ng-template #signedOut>
      <button class="auth-action" type="button" aria-label="Ir al inicio de sesión" (click)="goLogin()">
        Iniciar sesión
      </button>
      <button
        class="auth-action auth-action--primary"
        type="button"
        aria-label="Crear una cuenta"
        (click)="goRegister()"
      >
        Crear cuenta
      </button>
    </ng-template>
  </div>
</header>
