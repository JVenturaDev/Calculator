<main class="graph-workspace-page">
  <header class="graph-workspace-header">
    <div>
      <p class="graph-workspace-eyebrow">Graph Workspace</p>
      <h1>Graph Workspace</h1>
      <p class="graph-workspace-subtitle">
        Crea y compara varias funciones sobre un mismo canvas.
      </p>
    </div>

    <button
      class="graph-workspace-add"
      type="button"
      (click)="addFunction()"
    >
      <svg aria-hidden="true" viewBox="0 0 24 24">
        <path d="M12 5v14M5 12h14" />
      </svg>
      <span>Añadir función</span>
    </button>
  </header>

  <ng-container *ngIf="vm$ | async as vm">
    <section class="graph-workspace-canvas" aria-label="Canvas gráfico">
      <app-graph-canvas-container
        #graphCanvasContainer
        ariaLabel="Graph Workspace canvas"
      ></app-graph-canvas-container>
    </section>

    <section class="graph-functions-panel" aria-labelledby="graph-functions-title">
      <div class="graph-functions-header">
        <div>
          <p class="graph-workspace-eyebrow">Functions</p>
          <h2 id="graph-functions-title">Funciones</h2>
        </div>
        <span class="graph-functions-count">
          {{ vm.state.functions.length }} / 12
        </span>
      </div>

      <p
        *ngIf="vm.state.functions.length === 0"
        class="graph-functions-empty"
      >
        Aún no hay funciones. Añade una función para comenzar a graficar.
      </p>

      <ol
        *ngIf="vm.state.functions.length > 0"
        class="graph-functions-list"
      >
        <li
          *ngFor="let graphFunction of vm.state.functions; trackBy: trackFunction"
          class="graph-function-card"
          [class.graph-function-card--selected]="vm.state.selectedFunctionId === graphFunction.id"
        >
          <span
            class="graph-function-color"
            [style.background]="graphFunction.color"
            aria-hidden="true"
          ></span>

          <div class="graph-function-expression">
            <label
              class="graph-function-label"
              [for]="'graph-expression-' + graphFunction.id"
            >
              Expresión de {{ graphFunction.label }}
            </label>
            <div class="graph-function-equation">
              <span class="graph-function-prefix" aria-hidden="true">
                {{ graphFunction.label }}(x)=
              </span>
              <input
                [id]="'graph-expression-' + graphFunction.id"
                type="text"
                autocomplete="off"
                spellcheck="false"
                [value]="graphFunction.expression"
                [attr.placeholder]="graphFunction.plotKind === 'line' ? 'sin(x)' : 'x^2 + y^2'"
                (input)="updateExpression(graphFunction.id, $event)"
              />
            </div>
          </div>

          <label class="graph-function-kind">
            <span>Tipo</span>
            <select
              [value]="graphFunction.plotKind"
              [attr.aria-label]="'Tipo de gráfica para ' + graphFunction.label"
              (change)="setPlotKind(graphFunction.id, $event)"
            >
              <option value="line">Line</option>
              <option value="contour">Contour</option>
            </select>
          </label>

          <div class="graph-function-actions" aria-label="Acciones de función">
            <button
              class="graph-function-action"
              type="button"
              [class.graph-function-action--active]="graphFunction.visible"
              [attr.aria-pressed]="graphFunction.visible"
              [attr.aria-label]="graphFunction.visible ? 'Ocultar ' + graphFunction.label : 'Mostrar ' + graphFunction.label"
              (click)="toggleFunction(graphFunction.id)"
            >
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
              <span>{{ graphFunction.visible ? 'Visible' : 'Oculta' }}</span>
            </button>

            <button
              class="graph-function-action graph-function-action--select"
              type="button"
              [attr.aria-pressed]="vm.state.selectedFunctionId === graphFunction.id"
              [attr.aria-label]="'Seleccionar ' + graphFunction.label"
              (click)="selectFunction(graphFunction.id)"
            >
              <span>Seleccionar</span>
            </button>

            <button
              class="graph-function-action graph-function-action--danger"
              type="button"
              [attr.aria-label]="'Eliminar ' + graphFunction.label"
              (click)="removeFunction(graphFunction.id)"
            >
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M4 7h16M10 11v6M14 11v6M6 7l1 14h10l1-14M9 7V4h6v3" />
              </svg>
              <span>Eliminar</span>
            </button>
          </div>
        </li>
      </ol>

      <app-graph-workspace-inspector
        [selectedFunction]="vm.selectedFunction"
        [selectedSample]="vm.selectedSample"
        [viewport]="vm.viewport"
        [summary]="{
          totalFunctions: vm.state.functions.length,
          visibleFunctions: vm.visibleFunctions,
          readyFunctions: vm.readyFunctions,
          invalidFunctions: vm.invalidFunctions
        }"
        [error]="vm.error"
        [hoveredPoint]="graphCanvasContainer.hoveredPoint"
      ></app-graph-workspace-inspector>
    </section>
  </ng-container>
</main>
