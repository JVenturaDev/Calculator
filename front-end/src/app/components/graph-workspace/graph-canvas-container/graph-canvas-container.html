<ng-container *ngIf="vm$ | async as vm">
  <section
    class="graph-canvas-container"
    aria-label="Graph Workspace"
  >
    <div class="graph-canvas-toolbar" aria-label="Controles del canvas">
      <button
        class="graph-canvas-toolbar__button"
        type="button"
        aria-label="Restablecer viewport"
        (click)="resetViewport()"
      >
        Reset viewport
      </button>
    </div>

    <app-graph-canvas
      [samples]="vm.samples"
      [viewport]="vm.viewport"
      [selectedFunctionId]="vm.state.selectedFunctionId"
      [ariaLabel]="ariaLabel"
      (functionSelect)="selectFunction($event)"
      (hoverChange)="onHoverChange($event)"
      (viewportChange)="onViewportChange($event, vm.viewport)"
    ></app-graph-canvas>

    <p
      *ngIf="vm.error"
      class="graph-canvas-container__error"
      role="status"
      aria-live="polite"
    >
      {{ vm.error }}
    </p>
  </section>
</ng-container>
