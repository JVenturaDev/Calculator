<section
  class="graph-canvas-shell"
  [attr.aria-label]="ariaLabel"
  [attr.aria-busy]="loading"
>
  <div class="graph-canvas-stage">
    <div
      #plotContainer
      class="graph-canvas-plot"
      role="img"
      [attr.aria-label]="ariaLabel"
    ></div>

    <div
      *ngIf="loading"
      class="graph-canvas-status graph-canvas-status--loading"
      role="status"
      aria-live="polite"
      aria-atomic="true"
    >
      <span>Cargando vista 3D…</span>
    </div>

    <div
      *ngIf="errorMessage"
      class="graph-canvas-status graph-canvas-status--error"
      role="alert"
      aria-live="assertive"
      aria-atomic="true"
    >
      <span>{{ errorMessage }}</span>
    </div>
  </div>
</section>
