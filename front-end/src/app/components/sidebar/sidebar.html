<div
  *ngIf="isVisible"
  class="sidebar-backdrop"
  aria-hidden="true"
  (click)="closeSidebar()"
></div>

<aside
  id="calculator-sidebar"
  class="sidebar"
  [class.sidebar--visible]="isVisible"
  [attr.aria-hidden]="!isVisible"
  [attr.role]="isVisible ? 'dialog' : null"
  [attr.aria-modal]="isVisible ? 'true' : null"
  aria-label="Selector de calculadora"
  tabindex="-1"
  (keydown)="onSidebarKeydown($event)"
>
  <header class="sidebar-header">
    <span class="sidebar-mark" aria-hidden="true">
      <svg viewBox="0 0 24 24">
        <rect x="4" y="3" width="16" height="18" rx="3" />
        <path d="M8 7h8M8 12h.01M12 12h.01M16 12h.01M8 16h.01M12 16h.01M16 16h.01" />
      </svg>
    </span>
    <span class="sidebar-heading">
      <strong>Calculator Workspace</strong>
      <small>Seleccionar modo</small>
    </span>
  </header>

  <nav class="sidebar-navigation" aria-label="Navegación principal">
    <section class="navigation-section" aria-labelledby="calculator-navigation-title">
      <h2 id="calculator-navigation-title" class="navigation-label">Calculadora</h2>

      <button
        #sidebarAction
        class="nav-item"
        type="button"
        data-mode="basic"
        [class.nav-item--active]="activeCalc === 'basic'"
        [attr.aria-pressed]="activeCalc === 'basic'"
        (click)="select('basic')"
      >
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <rect x="5" y="3" width="14" height="18" rx="2" />
          <path d="M8 7h8M8 12h.01M12 12h.01M16 12h.01M8 16h.01M12 16h.01M16 16h.01" />
        </svg>
        <span>
          <strong>Basic</strong>
          <small>Operaciones esenciales</small>
        </span>
      </button>

      <button
        #sidebarAction
        class="nav-item"
        type="button"
        data-mode="scientific"
        [class.nav-item--active]="activeCalc === 'scientific'"
        [attr.aria-pressed]="activeCalc === 'scientific'"
        (click)="select('scientific')"
      >
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="M9 3h6M10 3v6l-5 8.5A2.3 2.3 0 0 0 7 21h10a2.3 2.3 0 0 0 2-3.5L14 9V3" />
          <path d="M8 15h8" />
        </svg>
        <span>
          <strong>Scientific</strong>
          <small>Funciones avanzadas</small>
        </span>
      </button>

      <button
        #sidebarAction
        class="nav-item"
        type="button"
        data-mode="graphic"
        [class.nav-item--active]="activeCalc === 'graphic'"
        [attr.aria-pressed]="activeCalc === 'graphic'"
        (click)="select('graphic')"
      >
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="M4 19V5M4 19h16" />
          <path d="m7 15 3-4 3 2 4-6" />
        </svg>
        <span>
          <strong>Graphic</strong>
          <small>Expresiones y gráficas</small>
        </span>
      </button>
    </section>

    <section class="navigation-section" aria-labelledby="workspace-navigation-title">
      <h2 id="workspace-navigation-title" class="navigation-label">Workspaces</h2>

      <button
        #sidebarAction
        class="nav-item nav-item--workspace"
        type="button"
        [class.nav-item--active]="isCalculatorWorkspaceActive()"
        [attr.aria-current]="isCalculatorWorkspaceActive() ? 'page' : null"
        (click)="goCalculatorWorkspace()"
      >
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="M4 5h16v14H4z" />
          <path d="M8 9h8M8 13h5M8 17h8" />
        </svg>
        <span>
          <strong>Calculator Workspace</strong>
          <small>Cálculos y tarjetas</small>
        </span>
      </button>

      <button
        #sidebarAction
        class="nav-item nav-item--workspace"
        type="button"
        [class.nav-item--active]="isGraphWorkspaceActive()"
        [attr.aria-current]="isGraphWorkspaceActive() ? 'page' : null"
        (click)="goGraphWorkspace()"
      >
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="M4 19V5M4 19h16" />
          <path d="M7 15c2-7 4-7 6 0s4 7 6 0" />
        </svg>
        <span>
          <strong>Graph Workspace</strong>
          <small>Varias funciones</small>
        </span>
      </button>
    </section>
  </nav>

  <footer class="sidebar-footer">
    <span class="status-dot" aria-hidden="true"></span>
    <span>Motor de cálculo disponible</span>
  </footer>
</aside>
