<section class="history-panel" aria-labelledby="history-panel-title">
  <header class="history-toolbar">
    <div>
      <span class="history-eyebrow">Registro de sesión</span>
      <h3 id="history-panel-title">Historial</h3>
    </div>

    <button
      class="clear-history"
      type="button"
      aria-label="Limpiar todo el historial"
      [disabled]="history.length === 0"
      (click)="clearAll()"
    >
      <svg aria-hidden="true" viewBox="0 0 24 24">
        <path d="M4 7h16M9 7V4h6v3M7 7l1 13h8l1-13M10 11v5M14 11v5" />
      </svg>
      <span>Limpiar</span>
    </button>
  </header>

  <div *ngIf="history.length > 0; else emptyHistory" id="history-list" class="history-list" role="list">
    <article
      *ngFor="let item of history"
      class="history-card"
      role="listitem"
      [attr.data-idi]="item.idi"
    >
      <div class="history-value">
        <span class="history-label">Expresión</span>
        <code class="history-expression">{{ item.expression }}</code>
      </div>

      <div class="history-divider" aria-hidden="true"></div>

      <div class="history-value">
        <span class="history-label">Resultado</span>
        <code class="history-result">{{ item.result }}</code>
      </div>

      <footer class="history-actions">
        <button
          class="restore-history"
          type="button"
          [attr.aria-label]="'Restaurar cálculo ' + item.expression"
          (click)="restoreHistory(item)"
        >
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M4 12a8 8 0 1 0 3-6.2L4 8" />
            <path d="M4 3v5h5" />
          </svg>
          <span>Restaurar</span>
        </button>

        <button
          class="delete-history"
          type="button"
          [attr.aria-label]="'Eliminar cálculo ' + item.expression"
          (click)="deleteItem(item.idi)"
        >
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M5 7h14M9 7V4h6v3M8 7l1 13h6l1-13M11 11v5M14 11v5" />
          </svg>
          <span>Eliminar</span>
        </button>
      </footer>
    </article>
  </div>

  <ng-template #emptyHistory>
    <div class="history-empty" role="status">
      <span class="empty-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path d="M3 12a9 9 0 1 0 3-6.7L3 8" />
          <path d="M3 3v5h5M12 7v5l3 2" />
        </svg>
      </span>
      <strong>Sin cálculos todavía</strong>
      <p>Las operaciones evaluadas aparecerán aquí.</p>
    </div>
  </ng-template>
</section>
