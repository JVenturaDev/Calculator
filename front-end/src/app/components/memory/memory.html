<section
  *ngIf="isVisible"
  class="memory-panel"
  aria-labelledby="memory-panel-title"
  [attr.aria-busy]="isLoading"
>
  <header class="memory-toolbar">
    <div>
      <span class="memory-eyebrow">Registros guardados</span>
      <h3 id="memory-panel-title">Memoria</h3>
    </div>

    <button
      class="clear-memory"
      type="button"
      aria-label="Limpiar todos los registros de memoria"
      [disabled]="isLoading || memoryList.length === 0"
      (click)="clearMemory()"
    >
      <svg aria-hidden="true" viewBox="0 0 24 24">
        <path d="M4 7h16M9 7V4h6v3M7 7l1 13h8l1-13M10 11v5M14 11v5" />
      </svg>
      <span>Limpiar</span>
    </button>
  </header>

  <div *ngIf="isLoading" class="memory-state" role="status">
    <span class="loading-spinner" aria-hidden="true"></span>
    <strong>Cargando memoria</strong>
    <p>Recuperando los registros guardados.</p>
  </div>

  <ng-container *ngIf="!isLoading">
    <div *ngIf="memoryList.length > 0; else emptyMemory" class="memory-list" role="list">
      <article
        *ngFor="let record of memoryList; trackBy: trackById"
        class="memory-card"
        role="listitem"
        [attr.data-id]="record.id"
      >
        <div class="memory-value">
          <span class="memory-label">Ecuación</span>
          <code class="memory-expression">{{ record.ecuacion }}</code>
        </div>

        <div class="memory-divider" aria-hidden="true"></div>

        <div class="memory-value">
          <span class="memory-label">Resultado</span>
          <code class="memory-result">{{ record.resultado }}</code>
        </div>

        <footer class="memory-actions">
          <button
            class="edit-memory"
            type="button"
            [attr.aria-label]="'Editar registro ' + record.ecuacion"
            (click)="editRecord(record.id)"
          >
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="m4 20 4.2-1 10-10a2.1 2.1 0 0 0-3-3l-10 10L4 20ZM13.8 7.2l3 3" />
            </svg>
            <span>Editar</span>
          </button>

          <button
            class="adjust-memory"
            type="button"
            [attr.aria-label]="'Sumar el resultado actual al registro ' + record.ecuacion"
            (click)="memoryPlusFor(record.id)"
          >
            M+
          </button>

          <button
            class="adjust-memory"
            type="button"
            [attr.aria-label]="'Restar el resultado actual al registro ' + record.ecuacion"
            (click)="memoryMinusFor(record.id)"
          >
            M−
          </button>

          <button
            class="delete-memory"
            type="button"
            [attr.aria-label]="'Eliminar registro ' + record.ecuacion"
            (click)="deleteRecord(record.id)"
          >
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M5 7h14M9 7V4h6v3M8 7l1 13h6l1-13M11 11v5M14 11v5" />
            </svg>
            <span>Eliminar</span>
          </button>
        </footer>
      </article>
    </div>
  </ng-container>

  <ng-template #emptyMemory>
    <div class="memory-state" role="status">
      <span class="empty-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <rect x="5" y="4" width="14" height="16" rx="2" />
          <path d="M9 8h6M9 12h6M9 16h3" />
        </svg>
      </span>
      <strong>Memoria vacía</strong>
      <p>Los resultados guardados aparecerán aquí.</p>
    </div>
  </ng-template>
</section>
