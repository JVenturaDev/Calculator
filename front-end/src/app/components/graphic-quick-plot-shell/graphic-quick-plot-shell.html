<section class="graphic-quick-shell" aria-labelledby="graphic-quick-shell-title">
  <header class="graphic-quick-shell__header">
    <div>
      <p class="graphic-quick-shell__eyebrow">Visualización</p>
      <h3 id="graphic-quick-shell-title">Gráfica rápida</h3>
    </div>
    <span class="graphic-quick-shell__status" aria-live="polite">
      {{ statusText }}
    </span>
  </header>

  <div
    class="graphic-quick-shell__toolbar"
    role="group"
    aria-label="Modo de visualización"
  >
    <button
      type="button"
      class="graphic-quick-shell__button"
      [class.graphic-quick-shell__button--active]="viewMode === '2d'"
      [attr.aria-pressed]="viewMode === '2d'"
      (click)="selectViewMode('2d')"
    >
      2D
    </button>

    <button
      type="button"
      class="graphic-quick-shell__button"
      [class.graphic-quick-shell__button--active]="viewMode === '3d'"
      [attr.aria-pressed]="viewMode === '3d'"
      [disabled]="!canUse3D"
      [attr.aria-disabled]="!canUse3D"
      [attr.title]="canUse3D ? 'Cambiar a vista 3D' : compatibilityMessage"
      (click)="selectViewMode('3d')"
    >
      3D
    </button>
  </div>

  <p
    *ngIf="viewMode === '3d' && !canUse3D"
    class="graphic-quick-shell__hint"
    role="status"
    aria-live="polite"
  >
    {{ compatibilityMessage }}
  </p>

  <p
    *ngIf="viewMode === '3d' && sampleError"
    class="graphic-quick-shell__error"
    role="alert"
    aria-live="assertive"
  >
    {{ sampleError }}
  </p>

  <div class="graphic-quick-shell__canvas">
    <app-graphic-plot *ngIf="viewMode === '2d'"></app-graphic-plot>

    <app-graph-canvas-3d
      *ngIf="viewMode === '3d'"
      [samples]="surfaceSamples"
      [scene]="scene"
      [selectedFunctionId]="selectedFunctionId"
      ariaLabel="Graph Workspace 3D canvas"
      (sceneChange)="onSceneChange($event)"
    ></app-graph-canvas-3d>
  </div>
</section>
