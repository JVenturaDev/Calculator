<main class="login-page">
  <div class="technical-grid" aria-hidden="true"></div>

  <section class="login-card" aria-labelledby="login-title" [attr.aria-busy]="loadingAction !== null">
    <header class="login-header">
      <span class="calculator-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <rect x="4" y="3" width="16" height="18" rx="3" />
          <path d="M8 7h8M8 12h.01M12 12h.01M16 12h.01M8 16h.01M12 16h.01M16 16h.01" />
        </svg>
      </span>
      <div>
        <h1 id="login-title">Calculator</h1>
        <p>Espacio de trabajo matemático</p>
      </div>
    </header>

    <form class="login-form" (ngSubmit)="login()">
      <div class="form-field">
        <label for="username">Usuario</label>
        <div class="input-wrapper">
          <svg class="field-icon" aria-hidden="true" viewBox="0 0 24 24">
            <path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Zm7 8a7 7 0 0 0-14 0" />
          </svg>
          <input id="username" name="username" type="text" placeholder="Tu usuario" autocomplete="username"
            [(ngModel)]="username" [disabled]="loadingAction !== null" required />
        </div>
      </div>

      <div class="form-field">
        <label for="password">Contraseña</label>
        <div class="input-wrapper">
          <svg class="field-icon" aria-hidden="true" viewBox="0 0 24 24">
            <rect x="5" y="10" width="14" height="10" rx="2" />
            <path d="M8 10V7a4 4 0 0 1 8 0v3" />
          </svg>
          <input id="password" name="password" type="password" placeholder="••••••••" autocomplete="current-password"
            [(ngModel)]="password" [disabled]="loadingAction !== null" required />
        </div>
      </div>

      <p class="error-message" *ngIf="error" role="alert" aria-live="assertive">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="9" />
          <path d="M12 7v6M12 17h.01" />
        </svg>
        <span>{{ error }}</span>
      </p>

      <button class="primary-action" type="submit" [disabled]="loadingAction !== null">
        <span>{{ loadingAction === 'login' ? 'Iniciando sesión…' : 'Iniciar sesión' }}</span>
        <svg *ngIf="loadingAction !== 'login'" aria-hidden="true" viewBox="0 0 24 24">
          <path d="m9 18 6-6-6-6" />
        </svg>
        <span *ngIf="loadingAction === 'login'" class="spinner" aria-hidden="true"></span>
      </button>
    </form>

    <div class="divider" aria-hidden="true">
      <span></span>
      <small>O</small>
      <span></span>
    </div>

    <div class="secondary-actions">
      <button type="button" class="secondary-action" (click)="continueAsGuest()" [disabled]="loadingAction !== null">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Zm7 8a7 7 0 0 0-14 0" />
        </svg>
        <span>{{ loadingAction === 'guest' ? 'Preparando sesión…' : 'Continuar como invitado' }}</span>
        <span *ngIf="loadingAction === 'guest'" class="spinner spinner--small" aria-hidden="true"></span>
      </button>
    </div>

    <footer class="login-footer">
      <span>¿No tienes una cuenta?</span>
      <button type="button" (click)="goRegister()" [disabled]="loadingAction !== null">
        Crear cuenta
      </button>
    </footer>
  </section>
</main>
