<div class="container">
  <h2>Login</h2>
  <div class="inputContainer">
    <label class="input_label" for="email_field">User</label>
    <input class="input1" type="text" placeholder="Username" [(ngModel)]="username" />
    <label class="input_label" for="password_field">Password</label>
    <input class="input2" type="password" placeholder="Password" [(ngModel)]="password" />
  </div>

  <div class="buttonsServices">
    <button class="buttons button" (click)="login()">Login</button>
    <div class="separator">
      <hr class="line">
      <span>Or</span>
      <hr class="line">
    </div>
    <button class="buttons button1" (click)="goRegister()">Registrer</button>
    <button class="buttons button" (click)="continueAsGuest()">Invitado</button>

  </div>

  <p *ngIf="error" style="color:red">{{ error }}</p>
</div>
