<div class="layout">
  <app-top-bar class="shell-topbar"></app-top-bar>

  <div class="gridd2">
    <app-sidebar></app-sidebar>

    <main class="main-container">
      <section class="workspace shell-panel" aria-label="Workspace">
        <app-work-space></app-work-space>
      </section>

      <section class="calculator shell-panel" aria-label="Calculadora">
        <section class="calculation" aria-label="Controles de cálculo">
          <div class="display">
            <app-display></app-display>
          </div>

          <div class="buttons">
            <div class="center">
              <app-calculator-basic></app-calculator-basic>
              <app-calculator-scientific></app-calculator-scientific>
              <app-graphic></app-graphic>
            </div>
          </div>
        </section>
      </section>

      <app-inspector-shell class="history shell-panel"></app-inspector-shell>
    </main>
  </div>
</div>
