<main class="register-page">
  <div class="technical-grid" aria-hidden="true"></div>

  <section class="register-card" aria-labelledby="register-title">
    <header class="register-header">
      <span class="calculator-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <rect x="4" y="3" width="16" height="18" rx="3" />
          <path d="M8 7h8M8 12h.01M12 12h.01M16 12h.01M8 16h.01M12 16h.01M16 16h.01" />
        </svg>
      </span>
      <div>
        <p class="product-name">Calculator</p>
        <h1 id="register-title">Register</h1>
        <p>Create your Calculator Workspace account</p>
      </div>
    </header>

    <form class="register-form" (ngSubmit)="register()">
      <div class="form-field">
        <label for="register-username">Username</label>
        <div class="input-wrapper">
          <svg class="field-icon" aria-hidden="true" viewBox="0 0 24 24">
            <path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Zm7 8a7 7 0 0 0-14 0" />
          </svg>
          <input
            id="register-username"
            name="username"
            type="text"
            placeholder="Choose a username"
            autocomplete="username"
            [(ngModel)]="username"
            required
          />
        </div>
      </div>

      <div class="form-field">
        <label for="register-password">Password</label>
        <div class="input-wrapper">
          <svg class="field-icon" aria-hidden="true" viewBox="0 0 24 24">
            <rect x="5" y="10" width="14" height="10" rx="2" />
            <path d="M8 10V7a4 4 0 0 1 8 0v3" />
          </svg>
          <input
            id="register-password"
            name="password"
            type="password"
            placeholder="Choose a password"
            autocomplete="new-password"
            [(ngModel)]="password"
            required
          />
        </div>
      </div>

      <p class="error-message" *ngIf="error" role="alert" aria-live="assertive">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="9" />
          <path d="M12 7v6M12 17h.01" />
        </svg>
        <span>{{ error }}</span>
      </p>

      <button class="primary-action" type="submit">
        <span>Register</span>
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="m9 18 6-6-6-6" />
        </svg>
      </button>
    </form>

    <div class="divider" aria-hidden="true">
      <span></span>
      <small>OR</small>
      <span></span>
    </div>

    <button type="button" class="secondary-action" (click)="continueAsGuest()">
      <svg aria-hidden="true" viewBox="0 0 24 24">
        <path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Zm7 8a7 7 0 0 0-14 0" />
      </svg>
      <span>Continue as guest</span>
    </button>

    <footer class="register-footer">
      <span>Already have an account?</span>
      <button type="button" (click)="goLogin()">Back to login</button>
    </footer>
  </section>
</main>
