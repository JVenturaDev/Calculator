<section
  class="graphic-keyboard"
  *ngIf="isVisible"
  aria-label="Teclado de calculadora gráfica"
>
  <div class="control-toolbar" role="group" aria-label="Controles gráficos">
    <button
      type="button"
      class="key control-key graph-view-key"
      aria-label="Alternar entre historial y gráfica"
      (click)="toggleHistory()"
    >{{ toggleService.current === 'graph' ? 'Historial' : 'Gráfica' }}</button>
    <button
      type="button"
      class="key control-key btnInequality"
      aria-label="Mostrar u ocultar desigualdades"
      [attr.aria-expanded]="showInequalitySymbols"
      (click)="showInequalitySymbols = !showInequalitySymbols"
    >⋚</button>
    <button
      type="button"
      class="key control-key"
      data-control="more"
      aria-label="Mostrar u ocultar controles de memoria"
      [attr.aria-expanded]="showMemoryButtons"
      (click)="showMemoryButtons = !showMemoryButtons"
    >More</button>
    <button
      type="button"
      class="key control-key"
      data-control="memory-panel"
      aria-label="Abrir panel de memoria"
      (click)="toggleMemoryPanel()"
    >M</button>
  </div>

  <div
    *ngIf="showInequalitySymbols"
    class="graphic-buttons"
    role="group"
    aria-label="Operadores de desigualdad"
  >
    <button type="button" class="key inequality-key" data-token="<"
      aria-label="Menor que" (mousedown)="$event.preventDefault()"
      (click)="handleButtonClick('<')">&lt;</button>
    <button type="button" class="key inequality-key" data-token="≥"
      aria-label="Mayor o igual que" (mousedown)="$event.preventDefault()"
      (click)="handleButtonClick('≥')">≥</button>
    <button type="button" class="key inequality-key" data-token="⩵"
      aria-label="Igualdad gráfica" (mousedown)="$event.preventDefault()"
      (click)="handleButtonClick('⩵')">⩵</button>
    <button type="button" class="key inequality-key" data-token="≠"
      aria-label="Distinto de" (mousedown)="$event.preventDefault()"
      (click)="handleButtonClick('≠')">≠</button>
    <button type="button" class="key inequality-key" data-token="≤"
      aria-label="Menor o igual que" (mousedown)="$event.preventDefault()"
      (click)="handleButtonClick('≤')">≤</button>
    <button type="button" class="key inequality-key" data-token=">"
      aria-label="Mayor que" (mousedown)="$event.preventDefault()"
      (click)="handleButtonClick('>')">></button>
  </div>

  <div
    *ngIf="showMemoryButtons"
    class="memory-toolbar"
    role="group"
    aria-label="Controles de memoria"
  >
    <button type="button" class="key memory-key" data-memory-action="clear"
      aria-label="Limpiar memoria" (click)="clearMemory()">MC</button>
    <button type="button" class="key memory-key" data-memory-action="recall"
      aria-label="Recuperar último valor de memoria" (click)="recallLast()">MR</button>
    <button type="button" class="key memory-key" data-memory-action="add"
      aria-label="Sumar valor actual a memoria" (click)="memoryPlus()">M+</button>
    <button type="button" class="key memory-key" data-memory-action="subtract"
      aria-label="Restar valor actual de memoria" (click)="memoryMinus()">M−</button>
    <button type="button" class="key memory-key" data-memory-action="save"
      aria-label="Guardar valor actual en memoria" (click)="saveMemory()">MS</button>
  </div>

  <section class="advanced-panel" aria-labelledby="graphic-functions-title">
    <h2 id="graphic-functions-title">Funciones avanzadas</h2>
    <div class="advanced-scroll">
      <div class="advanced-grid" role="group" aria-label="Funciones gráficas avanzadas">
        <button type="button" class="key advanced-key" data-token="acoth("
          (mousedown)="$event.preventDefault()" (click)="handleButtonClick('acoth(')">coth<sup>−1</sup></button>
        <button type="button" class="key advanced-key" data-token="acsch("
          (mousedown)="$event.preventDefault()" (click)="handleButtonClick('acsch(')">csch<sup>−1</sup></button>
        <button type="button" class="key advanced-key" data-token="asech("
          (mousedown)="$event.preventDefault()" (click)="handleButtonClick('asech(')">sech<sup>−1</sup></button>
        <button type="button" class="key advanced-key" data-token="asin("
          (mousedown)="$event.preventDefault()" (click)="handleButtonClick('asin(')">sin<sup>−1</sup></button>
        <button type="button" class="key advanced-key" data-token="acos("
          (mousedown)="$event.preventDefault()" (click)="handleButtonClick('acos(')">cos<sup>−1</sup></button>
        <button type="button" class="key advanced-key" data-token="atan("
          (mousedown)="$event.preventDefault()" (click)="handleButtonClick('atan(')">tan<sup>−1</sup></button>
        <button type="button" class="key advanced-key" data-token="asec("
          (mousedown)="$event.preventDefault()" (click)="handleButtonClick('asec(')">sec<sup>−1</sup></button>
        <button type="button" class="key advanced-key" data-token="acsc("
          (mousedown)="$event.preventDefault()" (click)="handleButtonClick('acsc(')">csc<sup>−1</sup></button>

        <button type="button" class="key advanced-key" data-token="acot("
          (mousedown)="$event.preventDefault()" (click)="handleButtonClick('acot(')">cot<sup>−1</sup></button>
        <button type="button" class="key advanced-key" data-token="asinh("
          (mousedown)="$event.preventDefault()" (click)="handleButtonClick('asinh(')">sinh<sup>−1</sup></button>
        <button type="button" class="key advanced-key" data-token="acosh("
          (mousedown)="$event.preventDefault()" (click)="handleButtonClick('acosh(')">cosh<sup>−1</sup></button>
        <button type="button" class="key advanced-key" data-token="atanh("
          (mousedown)="$event.preventDefault()" (click)="handleButtonClick('atanh(')">tanh<sup>−1</sup></button>
        <button type="button" class="key advanced-key" data-token="coth("
          (mousedown)="$event.preventDefault()" (click)="handleButtonClick('coth(')">coth</button>
        <button type="button" class="key advanced-key" data-token="csch("
          (mousedown)="$event.preventDefault()" (click)="handleButtonClick('csch(')">csch</button>
        <button type="button" class="key advanced-key" data-token="sech("
          (mousedown)="$event.preventDefault()" (click)="handleButtonClick('sech(')">sech</button>
        <button type="button" class="key advanced-key" data-token="sinh("
          (mousedown)="$event.preventDefault()" (click)="handleButtonClick('sinh(')">sinh</button>

        <button type="button" class="key advanced-key" data-token="cosh("
          (mousedown)="$event.preventDefault()" (click)="handleButtonClick('cosh(')">cosh</button>
        <button type="button" class="key advanced-key" data-token="tanh("
          (mousedown)="$event.preventDefault()" (click)="handleButtonClick('tanh(')">tanh</button>
        <button type="button" class="key advanced-key" data-token="sec("
          (mousedown)="$event.preventDefault()" (click)="handleButtonClick('sec(')">sec</button>
        <button type="button" class="key advanced-key" data-token="cot("
          (mousedown)="$event.preventDefault()" (click)="handleButtonClick('cot(')">cot</button>
        <button type="button" class="key advanced-key" data-token="csc("
          (mousedown)="$event.preventDefault()" (click)="handleButtonClick('csc(')">csc</button>
        <button type="button" class="key advanced-key" data-token="sin("
          (mousedown)="$event.preventDefault()" (click)="handleButtonClick('sin(')">sin</button>
        <button type="button" class="key advanced-key" data-token="cos("
          (mousedown)="$event.preventDefault()" (click)="handleButtonClick('cos(')">cos</button>
        <button type="button" class="key advanced-key" data-token="tan("
          (mousedown)="$event.preventDefault()" (click)="handleButtonClick('tan(')">tan</button>

        <button type="button" class="key advanced-key" data-token="e^("
          (mousedown)="$event.preventDefault()" (click)="handleButtonClick('e^(')">eˣ</button>
        <button type="button" class="key advanced-key" data-token="xylog("
          (mousedown)="$event.preventDefault()" (click)="handleButtonClick('xylog(')">log<sub>y</sub>x</button>
        <button type="button" class="key advanced-key" data-token="2^"
          (mousedown)="$event.preventDefault()" (click)="handleButtonClick('2^')">2<sup>x</sup></button>
        <button type="button" class="key advanced-key" data-token="yroot("
          (mousedown)="$event.preventDefault()" (click)="handleButtonClick('yroot(')">ʸ√x</button>
        <button type="button" class="key advanced-key" data-token="∛"
          aria-label="Raíz cúbica" (mousedown)="$event.preventDefault()"
          (click)="handleButtonClick('∛')">∛x</button>
        <button type="button" class="key advanced-key" data-token="³"
          aria-label="Elevar al cubo" (mousedown)="$event.preventDefault()"
          (click)="handleButtonClick('³')">x³</button>
        <button type="button" class="key advanced-key" data-token="ln("
          (mousedown)="$event.preventDefault()" (click)="handleButtonClick('ln(')">ln</button>
        <button type="button" class="key advanced-key" data-token="log("
          (mousedown)="$event.preventDefault()" (click)="handleButtonClick('log(')">log</button>

        <button type="button" class="key advanced-key" data-token="10^"
          (mousedown)="$event.preventDefault()" (click)="handleButtonClick('10^')">10ˣ</button>
        <button type="button" class="key advanced-key" data-token="pow("
          (mousedown)="$event.preventDefault()" (click)="handleButtonClick('pow(')">xʸ</button>
        <button type="button" class="key advanced-key" data-token="²√"
          aria-label="Raíz cuadrada" (mousedown)="$event.preventDefault()"
          (click)="handleButtonClick('²√')">²√x</button>
        <button type="button" class="key advanced-key" data-token="²"
          aria-label="Elevar al cuadrado" (mousedown)="$event.preventDefault()"
          (click)="handleButtonClick('²')">x²</button>
        <button type="button" class="key advanced-key" data-token="|x|("
          aria-label="Valor absoluto" (mousedown)="$event.preventDefault()"
          (click)="handleButtonClick('|x|(')">|x|</button>
        <button type="button" class="key advanced-key" data-token="⌊x⌋("
          aria-label="Redondear hacia abajo" (mousedown)="$event.preventDefault()"
          (click)="handleButtonClick('⌊x⌋(')">⌊x⌋</button>
        <button type="button" class="key advanced-key" data-token="⌈x⌉("
          aria-label="Redondear hacia arriba" (mousedown)="$event.preventDefault()"
          (click)="handleButtonClick('⌈x⌉(')">⌈x⌉</button>
        <button type="button" class="key advanced-key" data-token=","
          aria-label="Separador de argumentos" (mousedown)="$event.preventDefault()"
          (click)="handleButtonClick(',')">,</button>
      </div>
    </div>
  </section>

  <div class="function-grid" role="group" aria-label="Funciones gráficas principales">
    <button type="button" class="key function-key" data-token="π"
      aria-label="Pi" (mousedown)="$event.preventDefault()"
      (click)="handleButtonClick('π')">π</button>
    <button type="button" class="key function-key" data-token="1/"
      aria-label="Inverso multiplicativo" (mousedown)="$event.preventDefault()"
      (click)="handleButtonClick('1/')">1/x</button>
    <button type="button" class="key function-key" data-token="("
      aria-label="Abrir paréntesis" (mousedown)="$event.preventDefault()"
      (click)="handleButtonClick('(')">(</button>
    <button type="button" class="key function-key" data-token="e"
      aria-label="Número e" (mousedown)="$event.preventDefault()"
      (click)="handleButtonClick('e')">e</button>
    <button type="button" class="key function-key" data-token="|x|("
      aria-label="Valor absoluto" (mousedown)="$event.preventDefault()"
      (click)="handleButtonClick('|x|(')">|x|</button>
    <button type="button" class="key function-key" data-token=")"
      aria-label="Cerrar paréntesis" (mousedown)="$event.preventDefault()"
      (click)="handleButtonClick(')')">)</button>
    <button type="button" class="key function-key" data-token="AC"
      aria-label="Limpiar entrada" (mousedown)="$event.preventDefault()"
      (click)="handleButtonClick('AC')">C</button>
    <button type="button" class="key function-key variable-key" data-token="x"
      (mousedown)="$event.preventDefault()" (click)="handleButtonClick('x')">x</button>
    <button type="button" class="key function-key" data-token="⩵"
      aria-label="Igualdad gráfica" (mousedown)="$event.preventDefault()"
      (click)="handleButtonClick('⩵')">⩵</button>
    <button type="button" class="key function-key" data-token="DEL"
      aria-label="Borrar último carácter" (mousedown)="$event.preventDefault()"
      (click)="handleButtonClick('DEL')">DEL</button>
    <button type="button" class="key function-key variable-key" data-token="y"
      (mousedown)="$event.preventDefault()" (click)="handleButtonClick('y')">y</button>
  </div>

  <div class="keypad-layout">
    <div class="number-grid" role="group" aria-label="Números">
      <button type="button" class="key number-key" data-token="7"
        (mousedown)="$event.preventDefault()" (click)="handleButtonClick('7')">7</button>
      <button type="button" class="key number-key" data-token="8"
        (mousedown)="$event.preventDefault()" (click)="handleButtonClick('8')">8</button>
      <button type="button" class="key number-key" data-token="9"
        (mousedown)="$event.preventDefault()" (click)="handleButtonClick('9')">9</button>
      <button type="button" class="key number-key" data-token="4"
        (mousedown)="$event.preventDefault()" (click)="handleButtonClick('4')">4</button>
      <button type="button" class="key number-key" data-token="5"
        (mousedown)="$event.preventDefault()" (click)="handleButtonClick('5')">5</button>
      <button type="button" class="key number-key" data-token="6"
        (mousedown)="$event.preventDefault()" (click)="handleButtonClick('6')">6</button>
      <button type="button" class="key number-key" data-token="1"
        (mousedown)="$event.preventDefault()" (click)="handleButtonClick('1')">1</button>
      <button type="button" class="key number-key" data-token="2"
        (mousedown)="$event.preventDefault()" (click)="handleButtonClick('2')">2</button>
      <button type="button" class="key number-key" data-token="3"
        (mousedown)="$event.preventDefault()" (click)="handleButtonClick('3')">3</button>
      <button type="button" class="key number-key" data-token="-"
        aria-label="Introducir signo negativo" (mousedown)="$event.preventDefault()"
        (click)="handleButtonClick('-')">(−)</button>
      <button type="button" class="key number-key" data-token="0"
        (mousedown)="$event.preventDefault()" (click)="handleButtonClick('0')">0</button>
      <button type="button" class="key number-key" data-token="."
        aria-label="Separador decimal" (mousedown)="$event.preventDefault()"
        (click)="handleButtonClick('.')">.</button>
    </div>

    <div class="operator-grid" role="group" aria-label="Operadores">
      <button type="button" class="key operator-key" data-token="/"
        aria-label="Dividir" (mousedown)="$event.preventDefault()"
        (click)="handleButtonClick('/')">÷</button>
      <button type="button" class="key operator-key" data-token="*"
        aria-label="Multiplicar" (mousedown)="$event.preventDefault()"
        (click)="handleButtonClick('*')">×</button>
      <button type="button" class="key operator-key" data-token="-"
        aria-label="Restar" (mousedown)="$event.preventDefault()"
        (click)="handleButtonClick('-')">−</button>
      <button type="button" class="key operator-key" data-token="+"
        aria-label="Sumar" (mousedown)="$event.preventDefault()"
        (click)="handleButtonClick('+')">+</button>
      <button type="button" class="key operator-key primary-key" data-token="="
        aria-label="Evaluar expresión" (mousedown)="$event.preventDefault()"
        (click)="handleButtonClick('=')">=</button>
    </div>
  </div>
</section>
